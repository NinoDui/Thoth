# See https://pre-commit.com for usage.
# Install hooks:  pre-commit install
# Run on all:     pre-commit run --all-files
# Run manual:     pre-commit run --hook-stage manual <hook-id>
# Update pins:    pre-commit autoupdate

exclude: |
  (?x)^(
    build/.*|
    vcpkg_installed/.*|
    third_party/.*|
    models/.*|
    .*/moc_[^/]*\.(cpp|h)|
    .*/ui_[^/]*\.h|
    .*/qrc_[^/]*\.cpp|
    .*_autogen/.*|
    session-.*\.md|
    .*\.(png|jpg|jpeg|gif|pdf|wav|onnx|bin|gguf)
  )$

repos:
  # --- Generic file checks ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
      - id: check-json
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # --- C/C++ formatting ---
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]

  # --- CMake formatting / linting ---
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        additional_dependencies: [pyyaml]
      - id: cmake-lint
        additional_dependencies: [pyyaml]

  # --- Shell scripts ---
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck --severity=warning
        language: system
        types: [shell]
        pass_filenames: true

  # --- C++ linting / static analysis (local, manual stage) ---
  - repo: local
    hooks:
      - id: clang-tidy
        name: clang-tidy
        entry: clang-tidy --quiet -p build/debug
        language: system
        types_or: [c, c++]
        pass_filenames: true
        require_serial: true
        stages: [manual]

      - id: cppcheck
        name: cppcheck
        entry: cppcheck
        args:
          [
            --enable=warning,performance,portability,style,
            --inline-suppr,
            --suppress=missingIncludeSystem,
            --suppress=unmatchedSuppression,
            --suppress=unusedFunction,
            --suppress=noExplicitConstructor,
            --error-exitcode=0,
            --std=c++20,
            --language=c++,
          ]
        language: system
        types_or: [c, c++]
        pass_filenames: true
        require_serial: true
        stages: [manual]

      - id: cpplint
        name: cpplint
        entry: cpplint --recursive src/ include/ test/
        language: system
        pass_filenames: false
        types_or: [c, c++]
        require_serial: true
        stages: [manual]
